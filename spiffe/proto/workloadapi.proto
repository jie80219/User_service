// The following is the SPIFFE Workload API specification, represented as a
// Protocol Buffers v3 schema.
//
// For native types, please see:
// https://github.com/spiffe/spiffe/blob/main/standards/SPIFFE_Workload_API.md

syntax = "proto3";

package spiffe.workload;

import "google/protobuf/struct.proto";

option go_package = "github.com/spiffe/go-spiffe/v2/proto/spiffe/workload";

//////////////////////////////////////////////////////////////////////
// Core RPCs
//////////////////////////////////////////////////////////////////////

service SpiffeWorkloadAPI {
    ///////////////////////////////////////////////////////////////////////
    // X.509-SVID Profile
    ///////////////////////////////////////////////////////////////////////

    // Fetch X.509-SVIDs for all SPIFFE identities the workload is entitled to,
    // as well as related information like trust bundles and CRLs. As this
    // information changes, subsequent messages will be streamed from the
    // server.
    rpc FetchX509SVID(X509SVIDRequest) returns (stream X509SVIDResponse);

    // Fetch trust bundles and CRLs. Useful for clients that only need to
    // validate SVIDs without obtaining an SVID for themself. As this
    // information changes, subsequent messages will be streamed from the
    // server.
    rpc FetchX509Bundles(X509BundlesRequest) returns (stream X509BundlesResponse);

    ///////////////////////////////////////////////////////////////////////
    // JWT-SVID Profile
    ///////////////////////////////////////////////////////////////////////

    // Fetch JWT-SVIDs for all SPIFFE identities the workload is entitled to,
    // for the requested audience. If an optional SPIFFE ID is requested, only
    // the JWT-SVID for that SPIFFE ID is returned.
    rpc FetchJWTSVID(JWTSVIDRequest) returns (JWTSVIDResponse);

    // Fetches the JWT bundles, formatted as JWKS documents, keyed by the
    // SPIFFE ID of the trust domain. As this information changes, subsequent
    // messages will be streamed from the server.
    rpc FetchJWTBundles(JWTBundlesRequest) returns (stream JWTBundlesResponse);

    // Validates a JWT-SVID against the requested audience. Returns the SPIFFE
    // ID of the JWT-SVID and JWT claims.
    rpc ValidateJWTSVID(ValidateJWTSVIDRequest) returns (ValidateJWTSVIDResponse);
}

// The X509SVIDRequest message conveys parameters for requesting an X.509-SVID.
// There are currently no request parameters.
message X509SVIDRequest { }

// The X509SVIDResponse message conveys X.509-SVIDs.
message X509SVIDResponse {
    // Required. The list of returned X.509-SVIDs.
    repeated X509SVID svids = 1;

    // Optional. ASN.1 DER encoded certificate revocation lists.
    repeated bytes crl = 2;

    // Optional. CA certificate bundles for federating with foreign trust domains.
    // Bundles are ASN.1 DER encoded.
    map<string, bytes> federated_bundles = 3;
}

// The X509SVID message carries a single SVID and all associated information,
// including the private key and bundle.
message X509SVID {
    // Required. The SPIFFE ID of the X.509-SVID.
    string spiffe_id = 1;

    // Required. ASN.1 DER encoded X.509 certificate chain. The leaf certificate
    // (or SVID itself) MUST come first, followed by any intermediates.
    bytes x509_svid = 2;

    // Required. ASN.1 DER encoded PKCS#8 private key. MUST be unencrypted.
    bytes x509_svid_key = 3;

    // Required. ASN.1 DER encoded X.509 bundle for the trust domain.
    bytes bundle = 4;

    // Optional. A hint that can be used by a workload when more than one SVID is
    // returned. For example, "internal" or "external" to denote an SVID for
    // internal or external use, respectively.
    string hint = 5;
}

// The X509BundlesRequest message conveys parameters for requesting X.509
// bundles. There are currently no request parameters.
message X509BundlesRequest { }

// The X509BundlesResponse message conveys X.509 bundles.
message X509BundlesResponse {
    // Required. CA certificate bundles for the trust domain and federated
    // trust domains. Bundles are ASN.1 DER encoded.
    map<string, bytes> bundles = 1;
}

// The JWTSVIDRequest message conveys parameters for requesting JWT-SVIDs.
message JWTSVIDRequest {
    // Required. The audience(s) the workload intends to authenticate against.
    repeated string audience = 1;

    // Optional. If a SPIFFE ID is provided, only the JWT-SVID for that SPIFFE
    // ID is returned.
    string spiffe_id = 2;
}

// The JWTSVIDResponse message conveys JWT-SVIDs.
message JWTSVIDResponse {
    // Required. The list of returned JWT-SVIDs.
    repeated JWTSVID svids = 1;
}

// The JWTSVID message carries the JWT-SVID token and associated metadata.
message JWTSVID {
    // Required. The SPIFFE ID of the JWT-SVID.
    string spiffe_id = 1;

    // Required. Encoded JWT using JWS Compact Serialization.
    string svid = 2;

    // Optional. A hint that can be used by a workload when more than one SVID is
    // returned. For example, "internal" or "external" to denote an SVID for
    // internal or external use, respectively.
    string hint = 3;
}

// The JWTBundlesRequest message conveys parameters for requesting JWT bundles.
// There are currently no such parameters.
message JWTBundlesRequest { }

// The JWTBundlesResponse conveys JWT bundles.
message JWTBundlesResponse {
    // Required. JWK encoded JWT bundles, keyed by the SPIFFE ID of the trust
    // domain.
    map<string, bytes> bundles = 1;
}

// The ValidateJWTSVIDRequest message conveys parameters for validating a
// JWT-SVID.
message ValidateJWTSVIDRequest {
    // Required. Encoded JWT using JWS Compact Serialization.
    string svid = 1;

    // Required. The audience the workload expects to authenticate against.
    string audience = 2;
}

// The ValidateJWTSVIDResponse message conveys the JWT-SVID validation results.
message ValidateJWTSVIDResponse {
    // Required. The SPIFFE ID of the validated JWT-SVID.
    string spiffe_id = 1;

    // Required. Claims contained within the payload of the validated JWT-SVID.
    // This includes both SPIFFE-required and non-required claims.
    google.protobuf.Struct claims = 2;
}
